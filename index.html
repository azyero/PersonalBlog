<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="一个安静、清晰、适合长期写作的个人博客。" />
    <meta name="theme-color" content="#191a17" />
    <meta property="og:title" content="小奶牛手记 | 个人博客" />
    <meta property="og:description" content="记录技术、阅读、项目和日常观察的个人博客。" />
    <meta property="og:type" content="website" />
    <title>小奶牛手记 | 个人博客</title>
    <script>
      (() => {
        let savedTheme = null;

        try {
          savedTheme = localStorage.getItem('murmur-theme');
        } catch {
          savedTheme = null;
        }

        const isDark = savedTheme !== 'light';
        document.documentElement.classList.toggle('dark', isDark);
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute('content', isDark ? '#191a17' : '#f4ead8');
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
